<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lve4 - ① 패럴랙스 데모</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a14;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
    }

    #hud {
      position: fixed;
      top: 16px;
      left: 16px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 13px;
      line-height: 1.7;
      pointer-events: none;
      z-index: 100;
    }

    #hud strong {
      color: #7ec8e3;
    }

    #back {
      position: fixed;
      top: 16px;
      right: 16px;
      color: #555;
      font-size: 12px;
      text-decoration: none;
      z-index: 100;
    }

    #back:hover {
      color: #7ec8e3;
    }
  </style>
</head>

<body>
  <div id="hud">
    <strong>Lve4</strong> - 패럴랙스 스크롤링 데모<br />
    마우스를 움직여 카메라를 이동하세요<br />
    스크롤로 z축 이동
  </div>
  <a id="back" href="../">← 목록으로</a>
  <script type="module" src="./main.js"></script>
</body>

</html>
