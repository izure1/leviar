<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leviar - Debug Mode Test</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a14;
      overflow: hidden;
      margin: 0;
      font-family: sans-serif;
    }

    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1000;
      color: white;
      display: flex;
      gap: 10px;
    }

    button {
      padding: 8px 16px;
      cursor: pointer;
      background: #333;
      color: #fff;
      border: 1px solid #555;
      border-radius: 4px;
      font-weight: bold;
    }

    button:hover {
      background: #444;
    }

    button.active {
      background: #00ff88;
      color: #000;
      border-color: #00ff88;
    }
  </style>
</head>
<body>
  <div id="ui">
    <button id="toggle-btn">Debug Mode: OFF</button>
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
